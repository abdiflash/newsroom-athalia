<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsroom Athalia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .athalia-blue { background-color: #1F3A5F; }
        .card-story:hover { transform: translateY(-5px); transition: 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .snap-item { scroll-snap-align: center; }
        img { -webkit-touch-callout: default !important; }
    </style>
</head>
<body>

    <header class="athalia-blue text-white py-5 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-5">
            <h1 class="text-xl md:text-2xl font-extrabold tracking-tight uppercase">ATHALIA <span class="font-light text-blue-200">NEWSROOM</span></h1>
            <p class="text-[10px] md:text-xs opacity-85 font-medium tracking-wide">More Impact - More Value</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        
        <div class="bg-blue-50 border-l-4 border-blue-600 p-4 mb-6 rounded-r-xl shadow-sm">
            <p class="text-[11px] md:text-xs text-blue-900 leading-relaxed font-semibold">
                <i class="fas fa-user-lock mr-1"></i> PRIVASI: Akses foto album memerlukan login email <span class="underline">@sekolahathalia.sch.id</span>.
            </p>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-8 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="searchInput" onchange="applyFilters()" placeholder="Cari lalu tekan Enter..." 
                    class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-gray-400 uppercase hidden md:inline">Unit:</span>
                    <select id="filterUnit" onchange="applyFilters()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <option value="ALL">Semua Unit</option>
                        <option value="KB-TK">KB-TK</option>
                        <option value="SD">SD</option>
                        <option value="SMP">SMP</option>
                        <option value="SMA">SMA</option>
                        <option value="UMUM">UMUM</option>
                    </select>
                </div>

                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-gray-400 uppercase hidden md:inline">Tahun:</span>
                    <select id="filterTahun" onchange="applyFilters()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <option value="ALL">Semua Tahun</option>
                        <option value="2027">2027</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                    </select>
                </div>

                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-gray-400 uppercase hidden md:inline">Urutan:</span>
                    <select id="sortOrder" onchange="sortAndRender()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <option value="NEWEST">Terbaru</option>
                        <option value="OLDEST">Terlama</option>
                    </select>
                </div>

            </div>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            <div class="col-span-full text-center py-20 italic text-gray-400 text-sm">Menyusun momen berharga...</div>
        </div>

        <div id="paginationContainer" class="flex justify-center items-center gap-2 mt-12 mb-6"></div>
    </main>

    <script>
        // PENTING: Selalu pastikan URL di bawah ini menggunakan tautan exec New Deployment Apps Script Anda
        const API_URL = "https://script.google.com/macros/s/AKfycbwpXRT9wUoT1BiG_1BmM7b_jM4jnhJYK2FW3mr-kGwDmjUYtnb-w4M5TEbBMYo-1tIR/exec";
        
        let allNewsData = []; // Menyimpan data master dari server
        let currentFilteredData = [];
        let currentPage = 1;
        const itemsPerPage = 9; 
        let totalPages = 1;     

        async function loadData() {
            const listContainer = document.getElementById('list');
            const paginationContainer = document.getElementById("paginationContainer");

            // Jika data master belum ditarik dari server, lakukan fetch sekali saja
            if (allNewsData.length === 0) {
                listContainer.innerHTML = `<div class="col-span-full text-center py-20 italic text-gray-500 font-medium">Sedang mencari data dari server... <i class="fas fa-spinner fa-spin ml-2"></i></div>`;
                paginationContainer.innerHTML = ""; 
                try {
                    const response = await fetch(API_URL);
                    const result = await response.json();
                    allNewsData = result.data || [];
                } catch (err) {
                    listContainer.innerHTML = `<p class="text-red-500 text-center col-span-full font-bold">Gagal memuat data. Silakan periksa koneksi atau URL Apps Script.</p>`;
                    return;
                }
            }

            // Jalankan filter data lokal client-side agar pagination sinkron
            filterDataLocally();
        }

        function applyFilters() {
            currentPage = 1;
            filterDataLocally(); 
        }

        // FUNGSI KOREKSI: Memproses filter data secara lokal agar pembagian halaman (pagination) berfungsi akurat
        function filterDataLocally() {
            const unit = document.getElementById("filterUnit").value;
            const tahun = document.getElementById("filterTahun").value;
            const search = document.getElementById("searchInput").value.toLowerCase().trim();

            currentFilteredData = allNewsData.filter(item => {
                const matchUnit = (unit === "ALL" || (item.Unit && item.Unit.toUpperCase() === unit.toUpperCase()));
                
                // Cek kesesuaian tahun dari kolom Tahun_Ajaran atau Tanggal
                const itemYear = item.Tanggal ? item.Tanggal.split("/")[2] : "";
                const matchTahun = (tahun === "ALL" || itemYear === tahun || (item.Tahun_Ajaran && item.Tahun_Ajaran.includes(tahun)));
                
                // Cek pencarian teks judul atau cerita
                const srcJudul = (item.Judul_Kegiatan || item.Judul || "").toLowerCase();
                const srcCerita = (item.Cerita || "").toLowerCase();
                const matchSearch = (search === "" || srcJudul.includes(search) || srcCerita.includes(search));

                return matchUnit && matchTahun && matchSearch;
            });

            // Hitung total halaman berdasarkan data yang berhasil difilter
            totalPages = Math.ceil(currentFilteredData.length / itemsPerPage) || 1;

            sortAndRender();
        }

        function sortAndRender() {
            if (!currentFilteredData || currentFilteredData.error) return;

            const sortOrder = document.getElementById("sortOrder").value;
            currentFilteredData.sort((a, b) => {
                // Parsing format tanggal DD/MM/YYYY menjadi objek Date valid
                const partsA = (a.Tanggal || "").split("/");
                const partsB = (b.Tanggal || "").split("/");
                const dateA = partsA.length === 3 ? new Date(partsA[2], partsA[1] - 1, partsA[0]) : new Date(0);
                const dateB = partsB.length === 3 ? new Date(partsB[2], partsB[1] - 1, partsB[0]) : new Date(0);
                return sortOrder === "NEWEST" ? dateB - dateA : dateA - dateB;
            });
            
            renderCards();
        }

        // KOREKSI RESOLUSI FOTO: Mengarahkan langsung ke User Content Server Google agar foto tajam & responsif
        function fixDriveLink(url) {
            if (!url || url === "-" || url.trim() === "") return "";
            const cleanUrl = url.trim();
            const fileIdMatch = cleanUrl.match(/id=([-\w]{25,})/) || cleanUrl.match(/file\/d\/([-\w]{25,})/);
            if (fileIdMatch) {
                return `https://lh3.googleusercontent.com/d/$${fileIdMatch[1]}=s600`;
            }
            return cleanUrl;
        }

        function moveSlider(btn, direction) {
            const container = btn.parentElement.querySelector('.no-scrollbar');
            container.scrollBy({ left: direction * container.clientWidth, behavior: 'smooth' });
        }

        function renderPagination() {
            const container = document.getElementById("paginationContainer");
            container.innerHTML = "";

            if (totalPages <= 1) return; 

            const prevBtn = document.createElement("button");
            prevBtn.className = `px-4 py-2 rounded-xl text-sm font-bold border ${currentPage === 1 ? 'text-gray-300 border-gray-200 cursor-not-allowed' : 'text-blue-600 border-blue-600 hover:bg-blue-600 hover:text-white transition-all'}`;
            prevBtn.innerHTML = `<i class="fas fa-chevron-left"></i>`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; sortAndRender(); window.scrollTo({top: 0, behavior: 'smooth'}); } };
            container.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement("button");
                pageBtn.className = `w-10 h-10 rounded-xl text-sm font-bold border ${i === currentPage ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'text-gray-600 border-gray-200 hover:border-blue-600 hover:text-blue-600 transition-all'}`;
                pageBtn.innerText = i;
                pageBtn.onclick = () => { currentPage = i; sortAndRender(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                container.appendChild(pageBtn);
            }

            const nextBtn = document.createElement("button");
            nextBtn.className = `px-4 py-2 rounded-xl text-sm font-bold border ${currentPage === totalPages ? 'text-gray-300 border-gray-200 cursor-not-allowed' : 'text-blue-600 border-blue-600 hover:bg-blue-600 hover:text-white transition-all'}`;
            nextBtn.innerHTML = `<i class="fas fa-chevron-right"></i>`;
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; sortAndRender(); window.scrollTo({top: 0, behavior: 'smooth'}); } };
            container.appendChild(nextBtn);
        }

        function renderCards() {
            const container = document.getElementById("list");
            container.innerHTML = "";

            if (!currentFilteredData || currentFilteredData.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 italic text-gray-400">Tidak ada hasil yang ditemukan. Coba ubah kata kunci atau filter lainnya.</div>`;
                renderPagination();
                return;
            }

            // Slice data sesuai dengan porsi indeks halaman aktif (Pagination Execution)
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const dataToShow = currentFilteredData.slice(startIndex, endIndex);

            dataToShow.forEach(item => {
                const div = document.createElement("div");
                div.className = "bg-white rounded-3xl overflow-hidden shadow-sm card-story flex flex-col border border-gray-100";
                
                const photoLinks = (item.Link_Foto || "").split(",").map(p => p.trim()).filter(p => p !== "" && p !== "-");
                let photoHTML = "";

                if (photoLinks.length > 0) {
                    if (photoLinks.length > 1) {
                        photoHTML = `
                            <div class="relative group h-64">
                                <button onclick="moveSlider(this, -1)" class="absolute left-2 top-1/2 -translate-y-1/2 z-20 bg-black/30 text-white w-7 h-7 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i class="fas fa-chevron-left text-[10px]"></i>
                                </button>
                                <div class="flex overflow-x-auto no-scrollbar h-full bg-gray-100 scroll-smooth">
                                    ${photoLinks.map(link => `<img src="${fixDriveLink(link)}" class="snap-item shrink-0 w-full h-full object-cover">`).join('')}
                                </div>
                                <button onclick="moveSlider(this, 1)" class="absolute right-2 top-1/2 -translate-y-1/2 z-20 bg-black/30 text-white w-7 h-7 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i class="fas fa-chevron-right text-[10px]"></i>
                                </button>
                                <div class="absolute bottom-3 right-3 bg-black/60 backdrop-blur-sm text-white text-[9px] px-3 py-1 rounded-full font-black z-10 uppercase">
                                    <i class="fas fa-images mr-1"></i> ${photoLinks.length} Foto
                                </div>
                            </div>`;
                    } else {
                        photoHTML = `<img src="${fixDriveLink(photoLinks[0])}" class="w-full h-64 object-cover">`;
                    }
                } else {
                    photoHTML = `<div class="w-full h-64 bg-gray-50 flex flex-col items-center justify-center text-gray-300"><i class="far fa-image text-4xl mb-2"></i></div>`;
                }

                const judulSistem = item.Judul_Kegiatan || item.Judul || "Kegiatan Athalia";
                const safeKegiatan = encodeURIComponent(judulSistem);
                const safeCerita = encodeURIComponent(item.Cerita || "");
                const labelTahun = item.Tahun_Ajaran || item.Tahun || "";

                // RE-MAPPING FIELD: Menyelaraskan property kolom Link_Album dan Link_Video dari response Sheet
                const urlAlbum = item.Link_Album || item.PDF_Album || "";
                const urlVideo = item.Link_Video || item.Video || "";

                div.innerHTML = `
                    <div class="relative">${photoHTML}
                        <span class="absolute top-4 left-4 bg-white/95 backdrop-blur-sm px-4 py-1 rounded-full text-[10px] font-black text-blue-900 shadow-sm uppercase z-10">${item.Unit} ${labelTahun ? '| TA ' + labelTahun : ''}</span>
                    </div>
                    <div class="p-6 md:p-7 flex-grow flex flex-col">
                        <div class="text-[13px] text-blue-600 font-black uppercase tracking-widest mb-2">${item.Nilai || 'Inspirasi'}</div>
                        <h3 class="text-xl font-bold text-gray-900 leading-tight mb-4">${judulSistem}</h3>
                        <p class="text-gray-800 text-[15px] leading-relaxed mb-6 font-normal whitespace-pre-line">${item.Cerita}</p>
                        <div class="mt-auto space-y-3">
                            ${urlAlbum && urlAlbum !== "-" && urlAlbum.trim() !== "" ? `
                            <a href="${urlAlbum}" target="_blank" class="flex items-center justify-center w-full bg-blue-50 text-blue-700 py-3 rounded-2xl text-[11px] font-black hover:bg-blue-100 transition border-2 border-blue-100">
                                <i class="fab fa-google-drive mr-2"></i> BUKA ALBUM DRIVE
                            </a>` : ''}
                            
                            ${urlVideo && urlVideo !== "-" && urlVideo.trim() !== "" ? `
                            <a href="${urlVideo}" target="_blank" class="flex items-center justify-center w-full bg-slate-50 text-slate-700 py-3 rounded-2xl text-[11px] font-black hover:bg-slate-100 transition border-2 border-slate-200">
                                <i class="fas fa-play-circle mr-2 text-lg"></i> TONTON VIDEO
                            </a>` : ''}

                            <div class="pt-4 border-t border-gray-100 flex justify-between items-center text-[11px] text-gray-400 font-bold uppercase">
                                <span><i class="far fa-calendar-alt mr-1"></i> ${item.Tanggal || ''}</span>
                                <button onclick="copyCaption(this)" data-title="${safeKegiatan}" data-story="${safeCerita}" class="text-blue-900 bg-blue-50 px-3 py-2 rounded-lg font-black hover:bg-blue-100 transition">SALIN CAPTION</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            renderPagination();
        }

        function copyCaption(btn) {
            const title = decodeURIComponent(btn.getAttribute("data-title"));
            const story = decodeURIComponent(btn.getAttribute("data-story"));
            const text = `✨ *${title}* ✨\n\n${story}\n\n#SekolahAthalia #NewsroomAthalia`;
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert("Caption berhasil disalin!");
            } catch (err) {
                console.error('Gagal menyalin', err);
            }
            document.body.removeChild(textArea);
        }

        loadData();
    </script>
</body>
</html>
