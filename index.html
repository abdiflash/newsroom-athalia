<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athalia Newsroom - Validation Board</title>
  <style>
    /* 100% Mengembalikan Tampilan Dark Mode Sesuai Screenshot Asli Kamu */
    :root {
      --bg-dark: #121212;
      --bg-card: #1a1a1a;
      --border-color: #2d2d2d;
      --text-light: #e0e0e0;
      --accent-blue: #2563eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-light); padding: 30px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
    h1 { font-size: 24px; font-weight: 600; color: #ffffff; }
    .subtitle { color: #888; font-size: 13px; margin-top: 5px; }
    
    .btn { background-color: var(--accent-blue); color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { background-color: #1d4ed8; }
    
    /* Table Styling */
    .table-container { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    th { background-color: #161616; padding: 16px; font-weight: 600; color: #888; border-bottom: 1px solid var(--border-color); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
    td { padding: 16px; border-bottom: 1px solid var(--border-color); color: #cbd5e1; }
    tr:hover { background-color: #222222; }
    
    /* Status Badges */
    .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
    .badge-pending { background-color: rgba(217, 119, 6, 0.15); color: #f59e0b; border: 1px solid rgba(217, 119, 6, 0.3); }
    .badge-acc { background-color: rgba(37, 99, 235, 0.15); color: #3b82f6; border: 1px solid rgba(37, 99, 235, 0.3); }

    /* Loader Spinner */
    .loading-state { text-align: center; padding: 60px 0; color: #888; }
    .spinner { border: 3px solid rgba(255,255,255,0.05); border-radius: 50%; border-top: 3px solid var(--accent-blue); width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Newsroom Validation Board</h1>
      <div class="subtitle">Daftar artikel masuk yang memerlukan validasi Wakasek dan Publikasi.</div>
    </div>
    <button class="btn" onclick="muatDataAntrean()">🔄 Segarkan Antrean</button>
  </div>

  <div id="loaderBaris" class="loading-state">
    <div class="spinner"></div>
    <p>Menghubungkan ke Google Spreadsheet Engine...</p>
  </div>

  <div id="wrapperTabel" class="table-container hidden">
    <table>
      <thead>
        <tr>
          <th style="width: 15%;">Unit</th>
          <th style="width: 20%;">Tanggal</th>
          <th style="width: 45%;">Judul Berita</th>
          <th style="width: 10%;">Status</th>
          <th style="width: 10%; text-align: center;">Aksi</th>
        </tr>
      </thead>
      <tbody id="bodyAntrean">
        </tbody>
    </table>
  </div>

  <script>
    // URL Web App GAS Anda sesuai berkas image_ef14eb.png
    const API_URL = "https://script.google.com/a/macros/sekolahathalia.sch.id/s/AKfycbwpXRT9wUoT1BiG_1BmM7b_jM4jnhJYK2FW3mr-kGwDmjUYtnb-w4M5TEbBMYo-1tIR/exec";

    window.onload = function() {
      muatDataAntrean();
    };

    function muatDataAntrean() {
      document.getElementById('loaderBaris').classList.remove('hidden');
      document.getElementById('wrapperTabel').classList.add('hidden');

      // Ambil data antrean menggunakan parameter action
      fetch(`${API_URL}?action=getAntrean`)
        .then(res => {
          if (!res.ok) throw new Error("Gagal merespon");
          return res.json();
        })
        .then(data => {
          document.getElementById('loaderBaris').classList.add('hidden');
          const tbody = document.getElementById('bodyAntrean');
          tbody.innerHTML = "";

          if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#666; padding:30px;">Antrean kosong. Tidak ada berita PENDING atau ACC WAKASEK.</td></tr>`;
            document.getElementById('wrapperTabel').classList.remove('hidden');
            return;
          }

          data.forEach(item => {
            let kelasBadge = item.status.toUpperCase() === "ACC WAKASEK" ? "badge-acc" : "badge-pending";
            
            tbody.innerHTML += `
              <tr>
                <td style="font-weight: bold; color: #ffffff;">${item.unit}</td>
                <td>${item.tanggal}</td>
                <td>${item.judul}</td>
                <td><span class="badge ${kelasBadge}">${item.status}</span></td>
                <td style="text-align: center;">
                  <button class="btn" style="padding: 6px 12px; font-size: 12px; background-color: #2563eb;" onclick="bukaDetailBerita(${item.row})">Buka</button>
                </td>
              </tr>
            `;
          });

          document.getElementById('wrapperTabel').classList.remove('hidden');
        })
        .catch(err => {
          document.getElementById('loaderBaris').classList.add('hidden');
          alert("Gagal memuat data dari server Newsroom. Pastikan Akses Deployment GAS sudah disetel ke 'Siapa saja (Anyone)'.");
          console.error(err);
        });
    }

    function bukaDetailBerita(rowId) {
      // Logika integrasi untuk membuka modal kurasi popup kamu (image_e41999.png)
      alert("Membuka data baris nomor: " + rowId);
    }
  </script>
</body>
</html>
