<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athalia Publikasi Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-[#0f172a] text-white py-4 px-6 shadow flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-earth-asia text-blue-400 text-xl"></i>
            <h1 class="text-lg font-bold tracking-tight">Athalia Publikasi Dashboard</h1>
        </div>
        <a href="index.html" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-slate-200 px-3 py-1.5 rounded-lg transition flex items-center gap-1">
            <i class="fa-solid fa-globe"></i> Lihat Web Utama
        </a>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <div class="flex border-b border-slate-200 mb-6 gap-2">
            <button id="tabFormBtn" onclick="switchTab('form')" class="px-4 py-2 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 transition flex items-center gap-2">
                <i class="fa-regular fa-pen-to-square"></i> Input Kegiatan Baru
            </button>
            <button id="tabMonitorBtn" onclick="switchTab('monitor')" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition flex items-center gap-2">
                <i class="fa-solid fa-list-check"></i> Monitoring Status Berita
            </button>
        </div>

        <section id="formSection" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 max-w-3xl mx-auto">
            <div class="flex items-center gap-3 border-b pb-4 mb-6">
                <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-lg shadow-inner">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-slate-800">Form Kontributor Berita</h2>
                    <p class="text-xs text-slate-400">Folder foto di Google Drive otomatis terbuat berdasarkan format tanggal dan nama kegiatan.</p>
                </div>
            </div>

            <form id="guruForm" onsubmit="handleGuruSubmit(event)" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Unit Sekolah *</label>
                        <select id="formUnit" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                            <option value="">-- Pilih Unit --</option>
                            <option value="KB-TK">KB-TK</option>
                            <option value="SD">SD</option>
                            <option value="SMP">SMP</option>
                            <option value="SMA">SMA</option>
                            <option value="UMUM">UMUM</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Tanggal Pelaksanaan *</label>
                        <input type="date" id="formTanggal" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Nama / Judul Kegiatan *</label>
                    <input type="text" id="formJudul" required placeholder="Contoh: Perayaan Paskah Bersama SMA Athalia" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Kelas / Sasaran</label>
                        <input type="text" id="formKelas" placeholder="Contoh: Kelas 10 & 11" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Nilai Karakter (Value)</label>
                        <input type="text" id="formNilai" placeholder="Contoh: Integrity" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Cerita Narasi Berita (5W + 1H) *</label>
                    <textarea id="formCerita" required rows="5" placeholder="Tuliskan cerita berita..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 whitespace-pre-wrap"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Email Kontributor *</label>
                    <input type="email" id="formEmail" required placeholder="nama.guru@sekolahathalia.sch.id" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Pilih Foto Kegiatan (Maks 25) *</label>
                    <input type="file" id="formFiles" multiple accept="image/*" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm py-3 px-4 rounded-xl shadow-md transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i> Kirim Data ke Wakasek
                </button>
            </form>
        </section>

        <section id="monitorSection" class="hidden space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="text-base font-bold text-slate-800"><i class="fa-solid fa-folder-tree text-amber-500"></i> Peninjauan Berita Masuk</h2>
                <button onclick="loadBeritaWakasek()" class="bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold text-xs px-4 py-2 rounded-lg transition flex items-center gap-1.5">
                    <i class="fa-solid fa-rotate"></i> Refresh Tabel Data
                </button>
            </div>

            <div class="bg-white rounded-2xl border overflow-hidden shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead class="bg-slate-800 text-slate-200 font-bold uppercase tracking-wider">
                            <tr>
                                <th class="p-3 text-center">Row</th>
                                <th class="p-3">Unit</th>
                                <th class="p-3">Tanggal</th>
                                <th class="p-3">Judul Kegiatan</th>
                                <th class="p-3">Kontributor</th>
                                <th class="p-3 text-center">Status</th>
                                <th class="p-3 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="wakasekTbody" class="divide-y font-medium text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="kurasiModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90vh]">
                    <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
                        <h3 class="font-bold text-sm"><i class="fa-solid fa-wand-magic-sparkles text-amber-400"></i> Form Kurasi & Approval Wakasek</h3>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    
                    <div class="p-6 overflow-y-auto space-y-4 flex-1 text-xs">
                        <input type="hidden" id="modalRowNumber">
                        <input type="hidden" id="modalExistingLinkFoto">

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block font-bold uppercase text-slate-500 mb-1">Unit</label>
                                <input type="text" id="modalUnit" class="w-full bg-slate-100 border p-2 rounded-lg focus:outline-none" readonly>
                            </div>
                            <div>
                                <label class="block font-bold uppercase text-slate-500 mb-1">Tanggal</label>
                                <input type="text" id="modalTanggal" class="w-full bg-slate-100 border p-2 rounded-lg focus:outline-none" readonly>
                            </div>
                        </div>

                        <div>
                            <label class="block font-bold uppercase text-slate-500 mb-1">Judul Berita (Bisa Diedit)</label>
                            <input type="text" id="modalJudul" class="w-full border p-2 rounded-lg font-semibold text-slate-800">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block font-bold uppercase text-slate-500 mb-1">Kelas</label>
                                <input type="text" id="modalKelas" class="w-full border p-2 rounded-lg">
                            </div>
                            <div>
                                <label class="block font-bold uppercase text-slate-500 mb-1">Nilai Karakter</label>
                                <input type="text" id="modalNilai" class="w-full border p-2 rounded-lg">
                            </div>
                        </div>

                        <div>
                            <label class="block font-bold uppercase text-slate-500 mb-1">Narasi Berita</label>
                            <textarea id="modalCerita" rows="4" class="w-full border p-2 rounded-lg whitespace-pre-wrap"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block font-bold uppercase text-slate-500 mb-1">Link Album (Opsional)</label>
                                <input type="text" id="modalLinkAlbum" class="w-full border p-2 rounded-lg">
                            </div>
                            <div>
                                <label class="block font-bold uppercase text-slate-500 mb-1">Link Video (Opsional)</label>
                                <input type="text" id="modalLinkVideo" class="w-full border p-2 rounded-lg">
                            </div>
                        </div>

                        <div class="border-t pt-3">
                            <label class="block font-bold uppercase text-amber-600 mb-1"><i class="fa-regular fa-images"></i> Pilih Foto Utama (Maksimal 5 Foto Pilihan):</label>
                            <div id="photoSelectorGrid" class="grid grid-cols-3 gap-2 bg-slate-50 p-3 rounded-xl border max-h-40 overflow-y-auto">
                                </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 border-t pt-3 items-end">
                            <div>
                                <label class="block font-bold uppercase text-red-600 mb-1"><i class="fa-solid fa-key"></i> PIN Keamanan Wakasek *</label>
                                <input type="password" id="modalPin" placeholder="Masukkan PIN" class="w-full border p-2 rounded-lg text-center font-bold tracking-widest">
                            </div>
                            <div>
                                <label class="block font-bold uppercase text-slate-500 mb-1">Set Status Berita</label>
                                <select id="modalStatus" class="w-full border p-2 rounded-lg font-bold">
                                    <option value="PENDING">PENDING</option>
                                    <option value="TAYANG">TAYANG</option>
                                    <option value="TOLAK">TOLAK</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-4 border-t flex justify-end gap-2">
                        <button onclick="closeModal()" class="bg-slate-300 hover:bg-slate-400 font-bold px-4 py-2 rounded-xl text-xs transition">Batal</button>
                        <button onclick="submitWakasekUpdate()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2 rounded-xl text-xs transition shadow">Simpan Perubahan</button>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // LENGKAPI TAUTAN BERIKUT DENGAN URL WEB APP GOOGLE SCRIPT KAMU JUGA
        const API_URL = "https://script.google.com/macros/s/AKfycbwpXRT9wUoT1BiG_1BmM7b_jM4jnhJYK2FW3mr-kGwDmjUYtnb-w4M5TEbBMYo-1tIR/exec";
        let cacheBeritaRaw = [];

        function switchTab(target) {
            const fSec = document.getElementById("formSection");
            const mSec = document.getElementById("monitorSection");
            const fBtn = document.getElementById("tabFormBtn");
            const mBtn = document.getElementById("tabMonitorBtn");

            if(target === 'form') {
                fSec.classList.remove("hidden"); mSec.classList.add("hidden");
                fBtn.className = "px-4 py-2 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 transition flex items-center gap-2";
                mBtn.className = "px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition flex items-center gap-2";
            } else {
                fSec.classList.add("hidden"); mSec.classList.remove("hidden");
                mBtn.className = "px-4 py-2 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 transition flex items-center gap-2";
                fBtn.className = "px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition flex items-center gap-2";
                loadBeritaWakasek();
            }
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64String = reader.result.split(',')[1];
                    resolve({ base64Data: base64String, mimeType: file.type });
                };
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        async function handleGuruSubmit(e) {
            e.preventDefault();
            if(API_URL === "MASUKKAN_URL_WEB_APP_KAMU_DI_SINI") {
                alert("Silakan isi konstanta API_URL di file upload.html terlebih dahulu!");
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "Sedang Memproses & Mengupload Foto...";

            const filesInput = document.getElementById("formFiles").files;
            if(filesInput.length > 25) {
                alert("Maksimal upload sekaligus adalah 25 file.");
                btn.disabled = false; btn.innerText = "Kirim Data ke Wakasek";
                return;
            }

            try {
                let encodedFiles = [];
                for(let i=0; i<filesInput.length; i++) {
                    const res = await readFileAsBase64(filesInput[i]);
                    encodedFiles.push(res);
                }

                const payload = {
                    unit: document.getElementById("formUnit").value,
                    tanggal: document.getElementById("formTanggal").value,
                    namaKegiatan: document.getElementById("formJudul").value,
                    email: document.getElementById("formEmail").value,
                    data5W1H: {
                        kelas: document.getElementById("formKelas").value,
                        nilai: document.getElementById("formNilai").value,
                        cerita: document.getElementById("formCerita").value
                    },
                    files: encodedFiles
                };

                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const resJson = await response.json();

                if(resJson.status === "success") {
                    alert("Berita Berhasil Dikirim ke Antrean Wakasek!");
                    document.getElementById("guruForm").reset();
                } else {
                    alert("Gagal: " + resJson.message);
                }
            } catch(err) {
                alert("Terjadi kesalahan jaringan: " + err.toString());
            } finally {
                btn.disabled = false;
                btn.innerText = "Kirim Data ke Wakasek";
            }
        }

        async function loadBeritaWakasek() {
            if(API_URL === "MASUKKAN_URL_WEB_APP_KAMU_DI_SINI") return;
            const tbody = document.getElementById("wakasekTbody");
            tbody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-slate-400 animate-pulse">Menarik data spreadsheet...</td></tr>`;

            try {
                const response = await fetch(`${API_URL}?internal=true`);
                const res = await response.json();
                cacheBeritaRaw = res.data || [];
                tbody.innerHTML = "";

                if(cacheBeritaRaw.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-slate-400">Belum ada laporan kegiatan masuk.</td></tr>`;
                    return;
                }

                cacheBeritaRaw.forEach(item => {
                    let colorStatus = "bg-amber-100 text-amber-700";
                    if(item.Status === "TAYANG") colorStatus = "bg-green-100 text-green-700";
                    if(item.Status === "TOLAK") colorStatus = "bg-red-100 text-red-700";

                    const tr = document.createElement("tr");
                    tr.className = "hover:bg-slate-50 border-b transition";
                    tr.innerHTML = `
                        <td class="p-3 text-center font-bold text-slate-400">${item.rowNumber}</td>
                        <td class="p-3 font-bold">${item.Unit}</td>
                        <td class="p-3 text-slate-500">${item.Tanggal}</td>
                        <td class="p-3 font-semibold text-slate-800 line-clamp-1">${item.Judul_Kegiatan}</td>
                        <td class="p-3 text-slate-400">${item.Email_Kontributor || '-'}</td>
                        <td class="p-3 text-center">
                            <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase ${colorStatus}">${item.Status}</span>
                        </td>
                        <td class="p-3 text-center">
                            <button onclick="openKurasiModal(${item.rowNumber})" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-[11px] px-2.5 py-1 rounded-md shadow-sm transition"><i class="fa-solid fa-user-gear"></i> Kurasi</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(err) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-red-500">Gagal sinkronisasi data sheet.</td></tr>`;
            }
        }

        function openKurasiModal(rowNumber) {
            const item = cacheBeritaRaw.find(x => x.rowNumber === rowNumber);
            if(!item) return;

            document.getElementById("modalRowNumber").value = item.rowNumber;
            document.getElementById("modalUnit").value = item.Unit;
            document.getElementById("modalTanggal").value = item.Tanggal;
            document.getElementById("modalJudul").value = item.Judul_Kegiatan;
            document.getElementById("modalKelas").value = item.Kelas;
            document.getElementById("modalNilai").value = item.Nilai;
            document.getElementById("modalCerita").value = item.Cerita;
            document.getElementById("modalLinkAlbum").value = item.Link_Album || "-";
            document.getElementById("modalLinkVideo").value = item.Link_Video || "-";
            document.getElementById("modalStatus").value = item.Status;
            document.getElementById("modalExistingLinkFoto").value = item.Link_Foto;
            document.getElementById("modalPin").value = "";

            const grid = document.getElementById("photoSelectorGrid");
            grid.innerHTML = "";

            if(item.Link_Foto && item.Link_Foto !== "-") {
                const arrLinks = item.Link_Foto.split(",");
                arrLinks.forEach((link, i) => {
                    const cleanLink = link.trim();
                    const match = cleanLink.match(/id=([-\w]{25,})/) || cleanLink.match(/file\/d\/([-\w]{25,})/);
                    if(match) {
                        const fileId = match[1];
                        const wrapper = document.createElement("label");
                        wrapper.className = "relative block bg-white border rounded-lg overflow-hidden h-20 cursor-pointer hover:border-blue-500 transition shadow-sm";
                        
                        wrapper.innerHTML = `
                            <img src="https://lh3.googleusercontent.com/d/${fileId}=s150" class="w-full h-full object-cover">
                            <input type="checkbox" value="${fileId}" class="absolute top-1 left-1 w-4 h-4 accent-blue-600 rounded">
                            <span class="absolute bottom-0 right-0 bg-black/60 text-[9px] text-white px-1">F-${i+1}</span>
                        `;
                        grid.appendChild(wrapper);
                    }
                });
            } else {
                grid.innerHTML = `<p class="col-span-3 text-center py-4 text-slate-400">Tidak ada foto mentah terlampir.</p>`;
            }

            document.getElementById("kurasiModal").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("kurasiModal").classList.add("hidden");
        }

        async function submitWakasekUpdate() {
            const pin = document.getElementById("modalPin").value;
            if(!pin) { alert("Masukkan PIN Keamanan!"); return; }

            const checkedBoxes = document.querySelectorAll("#photoSelectorGrid input[type='checkbox']:checked");
            let selectedIds = [];
            checkedBoxes.forEach(box => selectedIds.push(box.value));

            if(document.getElementById("modalStatus").value === "TAYANG" && selectedIds.length > 5) {
                alert("Kurasi foto utama untuk thumbnail depan maksimal 5 foto saja!");
                return;
            }

            const payload = {
                action: "updateWakasek",
                rowNumber: document.getElementById("modalRowNumber").value,
                pin: pin,
                unit: document.getElementById("modalUnit").value,
                tanggal: document.getElementById("modalTanggal").value,
                judul: document.getElementById("modalJudul").value,
                kelas: document.getElementById("modalKelas").value,
                nilai: document.getElementById("modalNilai").value,
                cerita: document.getElementById("modalCerita").value,
                linkAlbum: document.getElementById("modalLinkAlbum").value,
                linkVideo: document.getElementById("modalLinkVideo").value,
                statusBerita: document.getElementById("modalStatus").value,
                existingLinkFoto: document.getElementById("modalExistingLinkFoto").value,
                selectedFileIds: selectedIds
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const res = await response.json();

                if(res.status === "success") {
                    alert(res.message);
                    closeModal();
                    loadBeritaWakasek();
                } else {
                    alert("Ditolak: " + res.message);
                }
            } catch(err) {
                alert("Error transmisi data: " + err.toString());
            }
        }
    </script>
</body>
</html>
