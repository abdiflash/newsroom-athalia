<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kurasi Berita Newsroom</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link class="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-16">

    <header class="bg-blue-600 text-white shadow-md mb-8">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-newspaper text-2xl"></i>
                <h1 class="text-xl font-bold tracking-wide">Sistem Kurasi Berita Sekolah</h1>
            </div>
            <div class="bg-blue-700 px-4 py-1.5 rounded-lg text-sm font-medium">
                <i class="fa-solid fa-user-shield mr-1"></i> Mode Portal: Wakil Kepala Sekolah & Publikasi
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 space-y-8">
        
        <section class="bg-white p-6 rounded-xl shadow-xs border border-gray-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-base font-bold text-gray-700 flex items-center gap-2">
                    <i class="fa-solid fa-clock text-amber-500"></i> Antrean Berita Berstatus PENDING / ACC
                </h2>
                <button onclick="muatAntreanPending()" id="btnRefreshAntrean" class="px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs font-bold rounded-lg border border-blue-200 transition-all cursor-pointer">
                    <i class="fa-solid fa-rotate mr-1"></i> Refresh Antrean
                </button>
            </div>

            <div id="loadingAntrean" class="text-center py-10">
                <i class="fa-solid fa-spinner animate-spin text-2xl text-blue-500 mb-2"></i>
                <p class="text-xs text-gray-500 font-medium">Memuat data dari antrean spreadsheet...</p>
            </div>

            <div id="wrapperTabelAntrean" class="overflow-x-auto hidden">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase font-bold text-xs tracking-wider">
                            <th class="p-3 text-center">Baris</th>
                            <th class="p-3">Unit</th>
                            <th class="p-3">Tanggal</th>
                            <th class="p-3">Judul Kegiatan</th>
                            <th class="p-3 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="bodyTabelAntrean" class="divide-y divide-gray-100 font-medium text-gray-700">
                    </tbody>
                </table>
            </div>
        </section>

        <section id="areaFormKurasi" class="hidden">
            <form id="formKurasiBerita" onsubmit="simpanPerubahanKurasi(event)" class="space-y-6">
                
                <div class="bg-white rounded-xl shadow-xs border border-gray-200 overflow-hidden">
                    <div class="bg-blue-50 border-b border-blue-100 px-6 py-4 flex justify-between items-center">
                        <span class="text-sm font-bold text-blue-800 uppercase tracking-wide">
                            <i class="fa-solid fa-pen-to-square mr-1"></i> EDITOR BERITA BARIS: <span id="labelRowNumber" class="bg-blue-200 px-2 py-0.5 rounded text-blue-900">#</span>
                        </span>
                        <span id="badgeUnit" class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs font-bold uppercase tracking-wider">-</span>
                    </div>

                    <div class="p-6 space-y-5">
                        <input type="hidden" id="targetRowHidden">

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                            <div class="md:col-span-2">
                                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Judul Kegiatan</label>
                                <input type="text" id="judul" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Tanggal Kegiatan</label>
                                <input type="date" id="tanggal" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm font-medium">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Kelas / Sasaran</label>
                                <input type="text" id="kelas" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nilai Karakter Inti</label>
                                <input type="text" id="nilai" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Narasi Berita / Keterangan 5W+1H (Bisa Diedit Ber-value)</label>
                            <textarea id="cerita" rows="7" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm leading-relaxed"></textarea>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 border-t border-gray-100 pt-5">
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-500 mb-1"><i class="fa-solid fa-folder-open text-emerald-500 mr-1"></i> Link Folder Google Drive Utama (Internal)</label>
                                <input type="url" id="linkAlbum" placeholder="https://drive.google.com/..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-xs font-mono">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-500 mb-1"><i class="fa-brands fa-youtube text-red-500 mr-1"></i> Link Video Dokumentasi / YouTube (Optional)</label>
                                <input type="url" id="linkVideo" placeholder="https://youtube.com/..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-xs font-mono">
                            </div>
                        </div>

                        <div class="pt-4 flex justify-end gap-3 border-t border-gray-100">
                            <button type="button" onclick="batalEdit()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg text-xs transition-all cursor-pointer">Batal</button>
                            <button type="submit" id="btnSimpan" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg text-xs shadow-xs transition-all cursor-pointer flex items-center gap-1.5">
                                <i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan Data Berita
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-amber-50 rounded-xl shadow-xs border border-amber-200 overflow-hidden">
                    <div class="bg-amber-100/70 border-b border-amber-200 px-6 py-3 flex items-center gap-2">
                        <i class="fa-solid fa-key text-amber-700"></i>
                        <h3 class="text-xs font-bold uppercase text-amber-800 tracking-wider">Otorisasi Validasi & Penerbitan Berjenjang</h3>
                    </div>
                    <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label for="status" class="block text-xs font-bold uppercase text-amber-900 mb-1">Keputusan Validasi Status Berita</label>
                            <select id="status" class="w-full px-3 py-2 bg-white border border-amber-300 rounded-lg font-bold text-gray-700 text-sm">
                                <option value="PENDING">PENDING (Tetap Berada di Antrean Tinjau)</option>
                                <option value="ACC">ACC (Disetujui Wakasek - Teruskan ke Tim Publikasi)</option>
                                <option value="TAYANG">TAYANG (Diterbitkan ke Web oleh Tim Publikasi)</option>
                                <option value="TOLAK">TOLAK (Arsipkan / Tolak Pengajuan Berita)</option>
                            </select>
                        </div>
                        <div>
                            <label for="pin" class="block text-xs font-bold uppercase text-amber-900 mb-1">PIN Keamanan Verifikasi Otoritas</label>
                            <input type="password" id="pin" placeholder="Masukkan PIN Wakasek untuk ACC atau PIN Publikasi untuk TAYANG" class="w-full px-3 py-2 bg-white border border-amber-300 rounded-lg font-mono text-center text-sm tracking-widest">
                        </div>
                    </div>
                </div>

            </form>
        </section>
    </main>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwpXRT9wUoT1BiG_1BmM7b_jM4jnhJYK2FW3mr-kGwDmjUYtnb-w4M5TEbBMYo-1tIR/exec";

        let rawUrlsArrayFromSheet = []; 

        document.addEventListener("DOMContentLoaded", function() {
            muatAntreanPending();
        });

        // 1. Ambil data baris dari Web App (Menampilkan PENDING dan ACC)
        function muatAntreanPending() {
            const loader = document.getElementById("loadingAntrean");
            const tableWrapper = document.getElementById("wrapperTabelAntrean");
            const tbody = document.getElementById("bodyTabelAntrean");
            const btnRefresh = document.getElementById("btnRefreshAntrean");

            loader.classList.remove("hidden");
            tableWrapper.classList.add("hidden");
            btnRefresh.disabled = true;

            fetch(`${WEB_APP_URL}?internal=true&limit=100`)
                .then(response => response.json())
                .then(res => {
                    btnRefresh.disabled = false;
                    loader.classList.add("hidden");
                    tbody.innerHTML = "";

                    const dataPending = res.data ? res.data.filter(item => {
                        const s = item["Status"] ? item["Status"].toString().toUpperCase() : "";
                        return s.includes("PENDING") || s.includes("ACC");
                    }) : [];

                    if (dataPending.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-400 text-xs font-medium"><i class="fa-solid fa-check-circle text-green-500 text-lg block mb-1"></i>Antrean kosong! Semua berita sudah ditinjau.</td></tr>`;
                        tableWrapper.classList.remove("hidden");
                        return;
                    }

                    dataPending.forEach(item => {
                        const tr = document.createElement("tr");
                        tr.className = "border-b border-gray-100 hover:bg-gray-50 transition-all text-xs";
                        
                        let badgeStatusColor = item.Status === "ACC" ? "bg-green-100 text-green-700" : "bg-amber-100 text-amber-700";
                        
                        tr.innerHTML = `
                            <td class="p-3 text-center font-bold text-blue-600 bg-blue-50/20 font-mono">${item.rowNumber}</td>
                            <td class="p-3 font-bold">
                                <span class="px-2 py-0.5 bg-gray-200 text-gray-700 rounded text-[10px] mr-1">${item.Unit || '-'}</span>
                                <span class="px-2 py-0.5 ${badgeStatusColor} rounded text-[10px] font-bold">${item.Status || 'PENDING'}</span>
                            </td>
                            <td class="p-3 text-gray-500 whitespace-nowrap">${item.Tanggal || '-'}</td>
                            <td class="p-3 font-semibold text-gray-800 max-w-xs truncate">${item.Judul_Kegiatan || '-'}</td>
                            <td class="p-3 text-center">
                                <button onclick="pilihBarisBerita(${item.rowNumber})" class="px-2.5 py-1 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded cursor-pointer transition-all">
                                    <i class="fa-solid fa-folder-open mr-1"></i> Buka Data
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                    tableWrapper.classList.remove("hidden");
                })
                .catch(err => {
                    btnRefresh.disabled = false;
                    loader.classList.add("hidden");
                    alert("Koneksi gagal mengambil antrean: " + err.toString());
                });
        }

        // 2. Membuka form detail baris & mengamankan data link foto tanpa render checkbox UI
        function pilihBarisBerita(rowNo) {
            const areaForm = document.getElementById("areaFormKurasi");
            areaForm.classList.add("hidden");

            const loading = document.createElement("div");
            loading.id = "temp-loading";
            loading.className = "fixed inset-0 bg-black/30 backdrop-blur-xs flex items-center justify-center z-50 text-white font-bold text-sm";
            loading.innerHTML = '<div class="bg-gray-800 p-4 rounded-lg flex items-center gap-2"><i class="fa-solid fa-spinner animate-spin text-blue-400"></i> Membuka lampiran data baris #' + rowNo + '...</div>';
            document.body.appendChild(loading);

            fetch(`${WEB_APP_URL}?action=getDetail&rowId=${rowNo}`)
                .then(response => response.json())
                .then(res => {
                    if (document.getElementById("temp-loading")) document.getElementById("temp-loading").remove();
                    if (res.status === "error") { alert(res.message); return; }

                    areaForm.classList.remove("hidden");
                    document.getElementById("targetRowHidden").value = rowNo;
                    document.getElementById("labelRowNumber").innerText = "#" + rowNo;
                    document.getElementById("badgeUnit").innerText = res.unit || "UMUM";
                    document.getElementById("judul").value = res.judul || "";
                    document.getElementById("tanggal").value = res.tanggal || "";
                    document.getElementById("kelas").value = res.kelas || "";
                    document.getElementById("nilai").value = res.nilai || "";
                    document.getElementById("cerita").value = res.cerita || "";
                    document.getElementById("linkAlbum").value = res.linkAlbum === "-" ? "" : (res.linkAlbum || "");
                    document.getElementById("linkVideo").value = res.linkVideo === "-" ? "" : (res.linkVideo || "");

                    rawUrlsArrayFromSheet = [];

                    // Mengamankan data link foto yang sudah tersimpan agar tidak hilang saat ditimpa
                    if (res.fotos && Array.isArray(res.fotos) && res.fotos.length > 0) {
                        res.fotos.forEach((foto) => {
                            rawUrlsArrayFromSheet.push(foto.url);
                        });
                    } else {
                        let rawLinksString = res.existingLinkFoto || "";
                        if (rawLinksString && rawLinksString !== "-") {
                            rawUrlsArrayFromSheet = rawLinksString.split(",").map(url => url.trim()).filter(url => url.length > 10);
                        }
                    }

                    document.getElementById("pin").value = "";
                    document.getElementById("status").value = res.statusBerita || "PENDING";
                    areaForm.scrollIntoView({ behavior: 'smooth' });
                })
                .catch(err => {
                    if (document.getElementById("temp-loading")) document.getElementById("temp-loading").remove();
                    alert("Gagal memproses data baris: " + err.toString());
                });
        }

        // 3. Pengiriman data hasil kurasi teks dan PIN otorisasi ke Google Apps Script
        function simpanPerubahanKurasi(event) {
            event.preventDefault();

            const rowNo = document.getElementById("targetRowHidden").value;
            const btn = document.getElementById("btnSimpan");
            const statusBerita = document.getElementById("status").value;
            const pinValue = document.getElementById("pin").value.trim();

            if ((statusBerita === "TAYANG" || statusBerita === "ACC") && !pinValue) {
                alert("⚠️ Otorisasi Ditolak: PIN Keamanan wajib diisi untuk memproses status " + statusBerita + "!");
                return;
            }

            // Diisi array kosong agar skrip backend code.gs tetap menerima variabel parameter tanpa bug
            let selectedUrlsArray = []; 

            const payload = {
                "action": "updateWakasek",
                "rowNumber": parseInt(rowNo),
                "judul": document.getElementById("judul").value.trim(),
                "tanggal": document.getElementById("tanggal").value,
                "kelas": document.getElementById("kelas").value.trim(),
                "nilai": document.getElementById("nilai").value.trim(),
                "cerita": document.getElementById("cerita").value.trim(),
                "linkAlbum": document.getElementById("linkAlbum").value.trim() || "-",
                "linkVideo": document.getElementById("linkVideo").value.trim() || "-",
                "statusBerita": statusBerita,
                "pin": pinValue,
                "selectedUrls": selectedUrlsArray,
                "existingLinkFoto": rawUrlsArrayFromSheet.join(", ") 
            };

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Memproses Penyimpanan...';

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan Data Berita';
                alert(`Sukses! Perubahan data Baris #${rowNo} dengan status [${statusBerita}] berhasil dikirim.`);
                document.getElementById("areaFormKurasi").classList.add("hidden");
                muatAntreanPending();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan Data Berita';
                alert("Gagal memperbarui database: " + err.toString());
            });
        }

        function batalEdit() {
            if (confirm("Batalkan proses kurasi pada baris ini?")) {
                document.getElementById("areaFormKurasi").classList.add("hidden");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
